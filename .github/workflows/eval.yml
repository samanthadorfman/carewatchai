name: Eval Regression Gate

# Runs the Le2i fall-detection benchmark on every PR into master and blocks
# the merge if F1 regresses vs. the best historical run recorded in
# data/eval_results/all_runs.csv. Uses the fixed 15-video CI benchmark
# (scripts/run_eval.py's CI_BENCHMARK_VIDEOS) so results stay comparable to
# that history instead of evaluating a different sample size.
#
# Requires a KAGGLE_API_TOKEN repo secret (Settings > Secrets and variables
# > Actions) — without it, the eval step fails fast with a clear message.
#
# Uses pull_request_target (not pull_request): PRs here go from
# samanthadorfman/carewatchai into eodorfman111/carewatchai — two different
# repos, so from GitHub's perspective every PR is cross-repo, same as a
# fork PR. GitHub never sends repo secrets to a plain `pull_request`-triggered
# run in that case (confirmed: PR #1 and #2 both failed instantly with no
# Kaggle credentials). pull_request_target does get secrets, but runs using
# the workflow file from *master*, not the PR branch — it will NOT test
# itself from within the PR that introduces it (same bootstrapping gotcha
# as pull_request); this file has to already be on master before a PR can
# exercise it. It also means the job executes the PR's own code with
# secrets available — a real reduced-security tradeoff, acceptable here
# because both contributors are known/trusted, not appropriate if this repo
# ever accepts outside PRs. We pin the checkout to the PR's head SHA so the
# job actually evaluates the PR's changes rather than master's.

on:
  pull_request_target:
    branches: [master]

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          # Ubuntu runner keeps crashing with glibc heap-corruption aborts
          # ("corrupted double-linked list" / "double free or corruption
          # (!prev)" / "munmap_chunk(): invalid pointer" — all the same
          # family of bug, different messages) always at the exact same
          # spot: torch's native Conv2d forward, on the first real
          # inference call. Doesn't reproduce locally on macOS. Ruled out
          # so far: CUDA bindings on a driver-less machine (fixed a
          # different, now-gone crash upstream of this one but not this
          # one), OpenMP/BLAS thread oversubscription, duplicate OpenMP
          # runtimes (KMP_DUPLICATE_LIB_OK), and AVX-512 CPU-capability
          # fallback (ATEN_CPU_CAPABILITY) — none of those fixed it, still
          # kept below since they're harmless. torch doesn't even declare a
          # hard numpy dependency in its wheel metadata, so a numpy pin
          # isn't well-motivated either. Trying an older, more mature,
          # widely-used torch/torchvision release instead of latest
          # (2.5.1/CPU-index-latest) — PyTorch 2.5 changed its CPU
          # convolution backend (oneDNN integration), and there's a known
          # history of oneDNN-related CPU crashes on certain virtualized
          # CPUs around that release. Unverified locally (still can't
          # reproduce this crash on macOS to confirm before pushing).
          pip install torch==2.3.1 torchvision==0.18.1 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run Le2i eval (fixed CI benchmark subset)
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          OMP_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          KMP_DUPLICATE_LIB_OK: "TRUE"
          PYTHONFAULTHANDLER: "1"
          # Disabling model fusing (src/evaluate.py) fixed that crash, but
          # the next run crashed identically ("corrupted size vs.
          # prev_size") one layer deeper: inside torch's own native Conv2d
          # forward pass, on the very first real inference call. GitHub
          # Actions ubuntu-latest runners are known to sometimes land on
          # Azure VM CPUs with inconsistent AVX-512 support, which corrupts
          # memory in PyTorch's vectorized CPU kernels — this forces PyTorch
          # down to its baseline (non-vectorized) kernels to route around
          # that. Unverified locally (can't reproduce this crash on macOS).
          ATEN_CPU_CAPABILITY: "default"
        run: python scripts/run_eval.py --subset Coffee_room_01 --dataset-name CI --no-commit

      - name: Check for F1 regression
        run: python scripts/check_regression.py
